<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orders — Brainrot Casino</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .page-header { padding: 32px 0; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
    .page-header h1 { font-size: 32px; margin: 0 0 5px; }
    .page-header p { color: var(--sub); font-size: 13px; }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
    }

    .shop-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      overflow: hidden;
      transition: .2s;
    }

    .shop-card:hover {
      transform: translateY(-4px);
      border-color: #3d7cff;
    }

    .shop-image-box {
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(180deg, #20232b, transparent);
    }

    .shop-image-box img {
      max-width: 90%;
      max-height: 150px;
      object-fit: contain;
    }

    .shop-content {
      padding: 14px;
    }

    .shop-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .shop-price {
      color: #ffd54a;
      font-size: 17px;
      font-weight: 800;
    }

    .shop-status {
      color: var(--sub);
      font-size: 12px;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .badge { 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      padding: 4px 9px; 
      border-radius: 20px; 
      font-size: 11px; 
      font-weight: 700;
      width: fit-content;
    }

    .badge-placed { background: #292d36; color: #fff; }
    .badge-confirmed { background: rgba(34,197,94,.12); color: #22c55e; }
    .badge-scheduled { background: rgba(249,115,22,.12); color: #ea580c; }
    .badge-rejected { background: rgba(239,68,68,.12); color: #ef4444; }
    .badge-delivered { background: rgba(168,85,247,.12); color: #a855f7; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--sub);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all .15s;
      margin-bottom: 12px;
    }

    .back-link:hover {
      color: var(--text);
      transform: translateX(-2px);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="navbar-brand"><div class="brand-dot"></div>Brainrot Casino</a>
  <div class="navbar-right">
    <div class="balance-pill">
      <span class="balance-icon">◈</span>
      <span id="balance-display">0.00</span>
    </div>
    <a href="deposit.html" class="btn-deposit" title="Deposit">+</a>
    <div class="user-menu">
      <div class="username-badge">
        <div class="avatar" id="user-avatar">?</div>
        <span class="username-text" id="username-display">Loading…</span>
        <span class="chevron">▾</span>
      </div>
      <div class="user-dropdown">
        <a href="index.html">Games</a>
        <a href="shop.html">Shop</a>
        <a href="deposit.html">Deposit</a>
        <div class="divider"></div>
        <button class="danger" onclick="signOut()">Sign out</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-wrapper">
  <a href="shop.html" class="back-link">← Back to Shop</a>
  <div class="page-header">
    <h1>Orders</h1>
    <p>Track your orders and see their status in real time.</p>
  </div>
  <div id="orders-grid" class="shop-grid">Loading orders…</div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  function toast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast ' + (type === 'error' ? 'error' : '');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  async function loadOrders() {
    const { data, error } = await db.from('shop_orders')
      .select('*, profiles:user_id(username)')
      .order('created_at', { ascending: false });
    const container = document.getElementById('orders-grid');
    if (error) {
      container.innerHTML = '<div class="coming-soon"><h2>Error loading orders.</h2></div>';
      console.error(error);
      return;
    }
    if (!data || !data.length) {
      container.innerHTML = '<div class="coming-soon"><h2>No orders yet.</h2><p>Your purchases will appear here as soon as you place them.</p></div>';
      return;
    }
    container.innerHTML = data.map(order => {
      const statusClass = 'badge-' + order.status;
      const schedule = order.scheduled_at ? new Date(order.scheduled_at).toLocaleString() : '—';
      const delivered = order.delivered_at ? new Date(order.delivered_at).toLocaleString() : '—';
      return `
        <div class="shop-card">
          <div class="shop-image-box">
            <img src="${order.item_snapshot.image_url || 'https://via.placeholder.com/200'}" alt="${order.item_snapshot.name}">
          </div>
          <div class="shop-content">
            <div class="shop-name">${order.item_snapshot.name}</div>
            <div class="shop-price">◈ ${formatCash(order.total_price)}</div>
            <div class="shop-status">
              <span class="badge ${statusClass}">${order.status}</span>
              ${order.admin_note ? `<span style="font-size:11px;color:var(--sub);">${order.admin_note}</span>` : ''}
              <span style="font-size:11px;color:var(--muted);">Scheduled: ${schedule}</span>
              <span style="font-size:11px;color:var(--muted);">Delivered: ${delivered}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  (async () => {
    const user = await requireNonAdmin();
    if (!user) return;
    document.getElementById('username-display').textContent = user.username || 'Player';
    document.getElementById('user-avatar').textContent = (user.username || 'P')[0].toUpperCase();
    document.getElementById('balance-display').textContent = formatCash(user.balance);
    await loadOrders();
  })();
</script>
</body>
</html>
